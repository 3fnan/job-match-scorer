<!DOCTYPE html>
<html>

<head>
    <title>Job Match Scorer</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            display: none;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>

<body>
    <h1>Job Match Scorer</h1>
    <form id="matchForm">
        <label><b>Job Requirements:</b></label>
        <textarea name="job_description" placeholder="Paste job description here..."></textarea>
        <label><b>Upload Your Resume (PDF):</b></label>
        <input type="file" name="resume" accept=".pdf">
        <br><br>
        <button type="submit">Check Match</button>
    </form>
    <div id="result">
        <p>Match Score:</p>
        <div class="score" id="score"></div>
        <p><b>Missing Keywords:</b></p>
        <p id="missing"></p>
    </div>
    <script>
        document.getElementById('matchForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const res = await fetch('/match', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('score').innerText = data.match_score + '%';
            document.getElementById('missing').innerText = data.missing_keywords.join(', ');
            document.getElementById('result').style.display = 'block';
        };
    </script>
</body>

</html>
